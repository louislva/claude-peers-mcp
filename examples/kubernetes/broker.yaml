# claude-peers broker — Kubernetes deployment
#
# Deploy with:
#   kubectl create namespace claude-peers
#   kubectl create secret generic claude-peers-auth -n claude-peers --from-literal=token=YOUR_TOKEN
#   kubectl apply -f broker.yaml
#
# Connect from Claude Code on any machine:
#   CLAUDE_PEERS_URL=http://<node-ip>:30789 CLAUDE_PEERS_TOKEN=YOUR_TOKEN

apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-peers-broker
  namespace: claude-peers
  labels:
    app: claude-peers-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-peers-broker
  template:
    metadata:
      labels:
        app: claude-peers-broker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: broker
          image: ghcr.io/louislva/claude-peers-broker:latest
          ports:
            - containerPort: 7899
              name: broker
          env:
            - name: CLAUDE_PEERS_HOST
              value: "0.0.0.0"
            - name: CLAUDE_PEERS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-peers-auth
                  key: token
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          readinessProbe:
            httpGet:
              path: /health
              port: 7899
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 7899
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: data
          # emptyDir is ephemeral — data is lost on pod restart.
          # For persistence, replace with a PVC:
          #   persistentVolumeClaim:
          #     claimName: claude-peers-data
          emptyDir:
            sizeLimit: 50Mi
---
apiVersion: v1
kind: Service
metadata:
  name: claude-peers
  namespace: claude-peers
spec:
  type: NodePort
  selector:
    app: claude-peers-broker
  ports:
    - port: 7899
      targetPort: 7899
      nodePort: 30789
      protocol: TCP
      name: broker
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: claude-peers
  namespace: claude-peers
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 7899
          protocol: TCP
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
